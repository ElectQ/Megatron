<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Megatron{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="/static/theme.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#0d0d0d]">
    <div class="drawer lg:drawer-open">
        <input id="nav" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col">
            <div class="navbar bg-[#171717] border-b border-white/[0.08] lg:hidden">
                <label for="nav" class="mobile-nav-toggle btn btn-square btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </label>
                <span class="text-base font-medium px-2">Megatron</span>
            </div>
            <main class="flex-1 p-6 lg:p-8 max-w-7xl mx-auto w-full">
                {% block content %}{% endblock %}
            </main>
        </div>
        <div class="drawer-side">
            <label for="nav" class="drawer-overlay"></label>
            <aside class="min-h-full w-60 bg-[#171717] border-r border-white/[0.08] flex flex-col">
                <div class="p-4 border-b border-white/[0.08]">
                    <h1 class="text-lg font-semibold tracking-tight">Megatron</h1>
                    <p class="text-xs text-[#737373] mt-0.5">LLM Analysis Hub</p>
                </div>
                <nav class="flex-1 p-3 space-y-0.5">
                    <a href="/ui/dashboard" class="nav-link {% if active=='dashboard' %}active{% endif %}">
                        <span>Overview</span>
                    </a>
                    <a href="/ui/tasks" class="nav-link {% if active=='tasks' %}active{% endif %}">
                        <span>Tasks</span>
                    </a>
                    <div class="pt-2 pb-1">
                        <a href="/ui/data/sources" class="nav-link {% if active and active.startswith('data_') %}active{% endif %}">
                            <span>Integrations</span>
                        </a>
                        <div class="ml-5 mt-0.5 space-y-0.5 border-l border-white/[0.08] pl-2">
                            <a href="/ui/data/sources" class="nav-link {% if active=='data_sources' %}active{% endif %}">
                                <span class="text-xs">MCP Sources</span>
                            </a>
                            <a href="/ui/data/collected" class="nav-link {% if active=='data_collected' %}active{% endif %}">
                                <span class="text-xs">Collected</span>
                            </a>
                            <a href="/ui/data/analyzed" class="nav-link {% if active=='data_analyzed' %}active{% endif %}">
                                <span class="text-xs">Analyzed</span>
                            </a>
                        </div>
                    </div>
                    <a href="/ui/prompts" class="nav-link {% if active=='prompts' %}active{% endif %}">
                        <span>Prompts</span>
                    </a>
                    <a href="/ui/providers" class="nav-link {% if active=='providers' %}active{% endif %}">
                        <span>LLM Providers</span>
                    </a>
                    <a href="/ui/channels" class="nav-link {% if active=='channels' %}active{% endif %}">
                        <span>Webhooks</span>
                    </a>
                </nav>
                <div class="p-4 border-t border-white/[0.08]">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-[#737373]">
                            {{ current_user or 'Guest' }}
                        </span>
                        <a href="/ui/logout" class="text-xs text-[#a3a3a3] hover:text-[#6366f1]">Sign out</a>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-[#737373]">
                        <span class="status-dot success"></span>
                        <span>online</span>
                        <span class="ml-auto">v0.2.0</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
