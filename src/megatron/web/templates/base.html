<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megatron</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="min-h-screen bg-base-200">
    <div class="drawer lg:drawer-open">
        <input id="nav" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col">
            <div class="navbar bg-base-100 lg:hidden">
                <label for="nav" class="btn btn-square btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </label>
                <span class="text-lg font-bold px-2">Megatron</span>
            </div>
            <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
                {% block content %}{% endblock %}
            </main>
        </div>
        <div class="drawer-side">
            <label for="nav" class="drawer-overlay"></label>
            <aside class="min-h-full w-64 bg-base-100 flex flex-col">
                <div class="p-4 border-b border-base-300">
                    <h1 class="text-xl font-bold">⚡ Megatron</h1>
                    <p class="text-xs text-base-content/60">LLM 分析中枢</p>
                </div>
                <ul class="menu p-4 flex-1 gap-1">
                    <li><a href="/ui/dashboard" class="{% if active=='dashboard' %}active{% endif %}">📊 仪表盘</a></li>
                    <li><a href="/ui/items" class="{% if active=='items' %}active{% endif %}">📝 数据浏览</a></li>
                    <li><a href="/ui/modules" class="{% if active=='modules' %}active{% endif %}">🔧 分析模块</a></li>
                    <li><a href="/ui/prompts" class="{% if active=='prompts' %}active{% endif %}">💬 提示词</a></li>
                    <li><a href="/ui/providers" class="{% if active=='providers' %}active{% endif %}">🤖 LLM 配置</a></li>
                    <li><a href="/ui/channels" class="{% if active=='channels' %}active{% endif %}">📣 推送渠道</a></li>
                    <li><a href="/ui/schedules" class="{% if active=='schedules' %}active{% endif %}">⏰ 定时任务</a></li>
                    <li><a href="/ui/runs" class="{% if active=='runs' %}active{% endif %}">🏃 运行历史</a></li>
                </ul>
                <div class="p-4 border-t border-base-300">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs text-base-content/60">
                            👤 {{ current_user or '未登录' }}
                        </span>
                        <a href="/ui/logout" class="btn btn-ghost btn-xs">退出</a>
                    </div>
                    <div class="text-xs text-base-content/40">
                        <span class="badge badge-success badge-sm">online</span>
                        v0.2.0
                    </div>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
