<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megatron · Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center mb-4 text-2xl">⚡ Megatron</h2>
            <p class="text-center text-xs text-base-content/60 mb-4">LLM Analysis Hub</p>
            {% if request.query_params.get('error') %}
            <div class="alert alert-error py-2">
                <span class="text-sm">Invalid username or password</span>
            </div>
            {% endif %}
            <form method="post" action="/ui/login">
                <label class="form-control mb-3">
                    <span class="label-text mb-1">Username</span>
                    <input type="text" name="username" class="input input-bordered w-full" required autofocus>
                </label>
                <label class="form-control mb-4">
                    <span class="label-text mb-1">Password</span>
                    <input type="password" name="password" class="input input-bordered w-full" required>
                </label>
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
