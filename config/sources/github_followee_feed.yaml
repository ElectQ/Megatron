# GitHub 关注流 —— 由 Sentinel-gh (Collector) 采集。
#
# 和推特那条一样：Sentinel-gh 每天爬完会把一个「日包」提交到自己仓库的
# bundles/YYYY-MM-DD.json，而那个文件本身就是一个 schema_version: 1 的统一信封
# （同样的 source_id、items[].external_id / metrics / flags）。所以这里同样
# 不需要任何字段映射，拉下来直接进 ingest。
#
# 和推特不同的一点：这个源**不推送**。它没有绑任何 webhook 渠道，只出日刊页
# （/day/github_followee_feed/<date>）。是不是推送由「模块有没有绑渠道」决定，
# 不由源决定 —— 所以这里 audience 仍是 personal，只是没有下游渠道去接。
#
# 数据形态：这是「你关注的安全研究者今天 star / fork 了哪些仓库」的事件流。
# 每条 item 的 content 就是 "X starred Y"，metrics.circle_count 表示有多少个
# 你关注的人碰了同一个目标 —— 多人汇聚 = 更值得看。

source_id: github_followee_feed
display_name: GitHub 关注流
kind: github_feed
adapter: bundle_pull
# 公开 —— 但脱敏。这个流对外的价值是「大家最近在 star 什么仓库」,而这个价值
# 不需要点名是谁。泄露的从来是「你关注了谁」(关注图谱),不是单条内容 —— 每条
# GitHub 事件本身就是公开的。所以:
#   audience: public   → 上公开前台,渲染成「仓库板」(web/public_github.py):
#                        私密页上那排 stargazer 头像,公开页换成一个收敛计数
#                        (「N 个账号同日收藏」)—— 计数不是身份,而它恰恰就是
#                        这条流的全部价值。时间线和按人分组的两栏直接不生成。
#   public_redact: true → 公开投影里剥掉 author 和原始 content(它写着「odzhan
#                         starred X」,含人名),只留 LLM 的 one_liner/why_for_me
#                         (prompt 被要求不带人名、只说仓库 + N 人 star)。
# 带 token 的日刊页 (/day/github_followee_feed/<date>?k=…) 不受影响,仍是你自己的
# 全量视图 —— 谁 star 了什么一清二楚。脱敏只发生在给陌生人看的公开页。
audience: [public]
public_redact: true
enabled: true

# 日刊页布局：feed = 仓库聚合的专属页（热门仓库/按人/时间线）。
# 默认 digest（推特那套分档卡片）。页面选择由此字段数据驱动，不再靠 kind 硬编码。
page_layout: feed

# 我们去拉的时间。Sentinel-gh 的 Action 在 21:00 UTC(05:00 北京)跑，
# 留足余量后在 22:40 UTC(06:40 北京)来取。
schedule:
  cron: "40 22 * * *"

# 期望到达时间，用于「今日源到达」健康检查
schedule_expect:
  timezone: Asia/Shanghai
  collect_by: "06:00"
  sla_minutes: 120

config:
  index_url: https://raw.githubusercontent.com/ElectQ/Sentinel-gh/main/bundles/index.json

  # 「新晋雷达」(你关注的人新关注了谁) 要不要上公开页。默认 true。
  # 它安全是有构造保证的:采集侧的 follow 事件只带**被关注者**,不带关注者
  # (engine/github_feed.py 的 FollowEvent),所以公开页展示的是一个公众账号的
  # 公开档案,不是你圈子里的谁。但它仍然在聚合层面透露「有人开始盯这个人了」,
  # 所以留一个开关:置 false 即整块不出现在公开页(私密日刊不受影响)。
  public_newcomers: true

  # 一次最多回补几天（冷启动/停机后追赶用）
  max_days: 7

  # index.json 和 <date>.json 是 CDN 上两个独立对象，可能被读到不一致的版本。
  # 校验摘要，对不上就跳过、等下一次轮询，而不是吃进一个残缺的日包。
  verify_sha256: true

  external_repo: ElectQ/Sentinel-gh
