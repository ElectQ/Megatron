# 推特安全流每日分析 —— 门铃推送 + 日刊页。
# 文件是「种子」：首启若库里没有同名任务就创建；之后可在后台改，UI 赢。
name: twitter_security_briefing
description: 每日推特安全信息流分级（门铃 + 日刊）
source: twitter_security_list
prompt: daily_intel_v1
provider: deepseek
schedule_cron: "0 9 * * *"      # 09:00 UTC = 17:00 北京
channels: [钉钉安全简报]          # 按名字绑定；缺渠道则不推送
filter_config:
  time_mode: today
  output_mode: day_bundle
  max_items: 0
  filters: []
