filter_config:
  time_mode: today
  output_mode: day_bundle
  max_items: 0
  title: GitHub 关注流
  intent:
    primary: [本地/自托管 AI Agent, 红队/攻防工具, 可复现的攻击手法]
    secondary: [漏洞利用, 逆向/取证, 值得上手的开源安全项目]
  caps:
    lead_min: 0
    must_see_min: 5
    must_see_max: 10
    recommend_max: 20
    skim_max: 0
