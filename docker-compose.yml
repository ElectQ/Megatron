services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: megatron-db
    environment:
      POSTGRES_DB: megatron
      POSTGRES_USER: megatron
      POSTGRES_PASSWORD: ${DB_PASSWORD:-megatron}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megatron -d megatron"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Megatron Web 服务
  web:
    build: .
    container_name: megatron-web
    environment:
      DATABASE_URL: postgresql+asyncpg://megatron:${DB_PASSWORD:-megatron}@db:5432/megatron
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Ch@ngeMe#2024!Secure}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Soundwave MCP Server (可选，取消注释以启用)
  # mcp-soundwave:
  #   build:
  #     context: ./mcp_servers/soundwave
  #     dockerfile: Dockerfile
  #   container_name: megatron-mcp-soundwave
  #   environment:
  #     GITHUB_REPO: ElectQ/Soundwave
  #     GITHUB_BRANCH: master
  #   depends_on:
  #     - web

volumes:
  postgres_data:
